<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch UMKM – Find Your Perfect Job</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            min-height: 100vh; color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .auth-container, .dashboard {
            background: white; border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); padding: 40px;
            max-width: 500px; margin: 0 auto 30px;
        }
        .dashboard { max-width: 1200px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 2px solid #e1e5e9;
            border-radius: 8px; font-size: 16px; transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2b5876;
        }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary { background: #6c757d; margin-top: 20px; }
        .user-type-selector { display: flex; gap: 15px; margin-bottom: 20px; }
        .user-type-card {
            flex: 1; padding: 20px; border: 3px solid #e1e5e9;
            border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .user-type-card.active { border-color: #2b5876; background: #f0f4ff; }
        .user-type-card h3 { color: #2b5876; margin-bottom: 10px; }
        .matches-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px; margin-top: 30px;
        }
        .match-card {
            background: white; border-radius: 12px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 5px solid #2b5876;
        }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .match-title { font-size: 1.3em; font-weight: 700; color: #333; }
        .match-type { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .match-job { background: #d4edda; color: #155724; }
        .match-candidate { background: #cce5ff; color: #004085; }
        .skills { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .skill-tag { background: #e9ecef; padding: 4px 12px; border-radius: 15px; font-size: 0.85em; }
        .stats { display: flex; gap: 20px; margin-top: 20px; font-size: 0.9em; color: #666; }
        .hidden { display: none; }
        .nav-tabs {
            display: flex; gap: 10px; margin-bottom: 30px;
            background: white; padding: 10px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .nav-tab {
            padding: 12px 24px; border: none; background: none;
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .nav-tab.active { background: #2b5876; color: white; }
        .error-message { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header h1 { font-size: 2em; }
            .matches-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧩 SkillMatch UMKM</h1>
            <p>Connect Jobs with Perfect Candidates – Powered by Google Sheets</p>
        </div>

        <!-- AUTHENTICATION -->
        <div id="authContainer" class="auth-container">
            <div class="user-type-selector">
                <div class="user-type-card active" data-type="jobseeker">
                    <h3>👨‍💼 Job Seeker</h3><p>Find your dream job</p>
                </div>
                <div class="user-type-card" data-type="employer">
                    <h3>🏢 UMKM / Employer</h3><p>Find perfect candidates</p>
                </div>
            </div>
            <div id="authMessage"></div>
            <form id="authForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters">
                </div>
                <input type="hidden" id="userType" value="jobseeker">
                <button type="submit" class="btn" id="authButton">Join SkillMatch</button>
                <p style="text-align: center; margin-top: 20px; color: #666;">
                    <span id="switchText">Already have an account?</span>
                    <a href="#" id="switchMode" style="color: #2b5876; font-weight: 600;">Login</a>
                </p>
            </form>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="dashboard hidden">
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="profile">My Profile</button>
                <button class="nav-tab" data-tab="matches">Matches</button>
                <button class="nav-tab" data-tab="post">Post Job / Resume</button>
            </div>
            <div id="dashboardMessage"></div>

            <!-- Profile Tab -->
            <div id="profileTab">
                <h2 id="welcomeMsg">Welcome!</h2>
                <form id="profileForm">
                    <div class="form-group">
                        <label id="profileLabel">Skills / Requirements</label>
                        <textarea id="skills" rows="4" placeholder="e.g., JavaScript, React, Node.js"></textarea>
                    </div>
                    <div class="form-group">
                        <label id="experienceLabel">Experience Level</label>
                        <select id="experience">
                            <option value="entry">Entry Level (0-2 years)</option>
                            <option value="mid">Mid Level (3-5 years)</option>
                            <option value="senior">Senior Level (5+ years)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="locationLabel">Location Preference</label>
                        <input type="text" id="location" placeholder="City or Remote">
                    </div>
                    <button type="submit" class="btn">Update Profile</button>
                </form>
            </div>

            <!-- Matches Tab -->
            <div id="matchesTab" class="hidden">
                <h2>Your Perfect Matches</h2>
                <div id="matchesGrid" class="matches-grid"></div>
            </div>

            <!-- Post Job / Resume Tab -->
            <div id="postTab" class="hidden">
                <h2 id="postTitle">Post New Job / Resume</h2>
                <form id="postForm">
                    <div class="form-group">
                        <label id="postLabel">Job Title / Position</label>
                        <input type="text" id="jobTitle" placeholder="e.g., Full Stack Developer">
                    </div>
                    <div class="form-group hidden" id="postSkillsGroup">
                        <label>Required Skills (for UMKM)</label>
                        <textarea id="postSkills" rows="3" placeholder="e.g., JavaScript, React, Node.js"></textarea>
                    </div>
                    <button type="submit" class="btn">Post & Find Matches</button>
                </form>
            </div>

            <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlkgjGAT1k9IQhxrB8ZS0BfgEJlhDQe4H56L4eswXPaeVI6e6qsB0X5IXY3Sm0gLjU/exec'; // Replace with your deployed Apps Script URL

        class SkillMatchApp {
            constructor() {
                this.currentUser = null;
                this.isLoginMode = false;
                this.init();
            }

            init() {
                this.bindEvents();
                this.checkStoredSession();
            }

            bindEvents() {
                document.getElementById('authForm').addEventListener('submit', e => this.handleAuth(e));
                document.querySelectorAll('.user-type-card').forEach(card => {
                    card.addEventListener('click', e => this.selectUserType(e.currentTarget));
                });
                document.getElementById('switchMode').addEventListener('click', e => {
                    e.preventDefault();
                    this.toggleAuthMode();
                });
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.addEventListener('click', e => this.switchTab(e.currentTarget));
                });
                document.getElementById('profileForm').addEventListener('submit', e => this.updateProfile(e));
                document.getElementById('postForm').addEventListener('submit', e => this.postJobResume(e));
                document.getElementById('logoutBtn').addEventListener('click', () => this.logout());
            }

            selectUserType(card) {
                document.querySelectorAll('.user-type-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                document.getElementById('userType').value = card.dataset.type;
            }

            toggleAuthMode() {
                this.isLoginMode = !this.isLoginMode;
                const btn = document.getElementById('authButton');
                const switchText = document.getElementById('switchText');
                const switchLink = document.getElementById('switchMode');
                if (this.isLoginMode) {
                    btn.textContent = 'Login';
                    switchText.textContent = "Don't have an account?";
                    switchLink.textContent = 'Register';
                    document.getElementById('name').parentElement.style.display = 'none';
                } else {
                    btn.textContent = 'Join SkillMatch';
                    switchText.textContent = 'Already have an account?';
                    switchLink.textContent = 'Login';
                    document.getElementById('name').parentElement.style.display = 'block';
                }
                this.clearMessage();
            }

            async handleAuth(e) {
                e.preventDefault();
                this.clearMessage();
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const userType = document.getElementById('userType').value;

                if (!email || !password) return this.showMessage('Please fill in all required fields', 'error');
                if (password.length < 6) return this.showMessage('Password must be at least 6 characters', 'error');
                if (!this.isLoginMode && !name) return this.showMessage('Please enter your full name', 'error');

                try {
                    if (this.isLoginMode) {
                        const res = await this.apiCall('login', { email, password });
                        if (!res.success) return this.showMessage(res.message, 'error');
                        this.currentUser = res.user;
                    } else {
                        const res = await this.apiCall('register', { name, email, password, type: userType });
                        if (!res.success) return this.showMessage(res.message, 'error');
                        this.currentUser = res.user;
                    }
                    this.saveSession(this.currentUser);
                    this.showDashboard();
                } catch (err) {
                    this.showMessage('Network error. Check the console.', 'error');
                    console.error(err);
                }
            }

            async updateProfile(e) {
                e.preventDefault();
                if (!this.currentUser) return;
                this.currentUser.profile = {
                    skills: document.getElementById('skills').value,
                    experience: document.getElementById('experience').value,
                    location: document.getElementById('location').value
                };
                const res = await this.apiCall('updateProfile', {
                    userId: this.currentUser.id,
                    profile: this.currentUser.profile
                });
                if (res.success) {
                    this.saveSession(res.user);
                    this.showMessage('Profile updated successfully!', 'success');
                    this.findMatches();
                } else {
                    this.showMessage(res.message, 'error');
                }
            }

            async postJobResume(e) {
                e.preventDefault();
                const title = document.getElementById('jobTitle').value;
                if (!title) return this.showMessage('Please enter a job title / position', 'error');

                const isEmployer = this.currentUser.type === 'employer';

                if (isEmployer) {
                    const postSkills = document.getElementById('postSkills').value.trim();
                    if (!postSkills) return this.showMessage('Please enter the required skills for the job', 'error');

                    // Update UMKM profile skills with the required skills for the vacancy
                    const profileRes = await this.apiCall('updateProfile', {
                        userId: this.currentUser.id,
                        profile: {
                            skills: postSkills,
                            experience: this.currentUser.profile?.experience || 'mid',
                            location: this.currentUser.profile?.location || ''
                        }
                    });
                    if (!profileRes.success) {
                        return this.showMessage('Failed to save required skills', 'error');
                    }
                    this.currentUser = profileRes.user;
                    this.saveSession(this.currentUser);
                }

                const res = await this.apiCall('postJob', {
                    userId: this.currentUser.id,
                    title
                });

                if (res.success) {
                    this.currentUser = res.user;
                    this.saveSession(res.user);
                    document.getElementById('jobTitle').value = '';
                    if (isEmployer) document.getElementById('postSkills').value = '';
                    this.showMessage('Posted successfully!', 'success');
                    this.findMatches();
                } else {
                    this.showMessage(res.message, 'error');
                }
            }

            async findMatches() {
                if (!this.currentUser || !this.currentUser.profile || !this.currentUser.profile.skills) {
                    document.getElementById('matchesGrid').innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;">Complete your profile to find matches!</p>';
                    return;
                }
                const res = await this.apiCall('getMatches', { userId: this.currentUser.id });
                if (res.success) {
                    this.displayMatches(res.matches);
                } else {
                    this.showMessage('Could not load matches', 'error');
                }
            }

            displayMatches(matches) {
                const grid = document.getElementById('matchesGrid');
                if (!matches.length) {
                    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;">No matches yet. Complete your profile and post something!</p>';
                    return;
                }
                grid.innerHTML = '';
                matches.forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'match-card';
                    const latestPost = match.user.posts?.length ? match.user.posts[match.user.posts.length - 1] : null;
                    const skillsList = match.user.profile.skills ? match.user.profile.skills.split(',').slice(0, 5) : [];
                    card.innerHTML = `
                        <div class="match-header">
                            <div class="match-title">${latestPost ? latestPost.title : 'No posts yet'}</div>
                            <div class="match-type match-${match.type}">${match.user.type === 'jobseeker' ? 'Candidate' : 'Job'}</div>
                        </div>
                        <div class="skills">
                            ${skillsList.map(skill => `<span class="skill-tag">${skill.trim()}</span>`).join('')}
                        </div>
                        <div style="margin:15px 0;color:#666;font-size:0.95em;">
                            <strong>${match.user.name}</strong><br>
                            ${match.user.profile.experience || 'Experience not specified'} · ${match.user.profile.location || 'Location not specified'}
                        </div>
                        <div class="stats">
                            <span>Match Score: ${Math.round(match.score * 100)}%</span>
                            <span>${match.user.posts?.length || 0} posts</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            switchTab(tab) {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('[id$="Tab"]').forEach(t => t.classList.add('hidden'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Tab').classList.remove('hidden');
                if (tab.dataset.tab === 'matches') this.findMatches();
            }

            showDashboard() {
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                const isJobseeker = this.currentUser.type === 'jobseeker';
                document.getElementById('welcomeMsg').textContent = `Welcome back, ${this.currentUser.name}!`;

                // Adjust labels according to role
                document.getElementById('profileLabel').textContent = isJobseeker ? 'Your Skills' : 'Job Requirements';
                document.getElementById('experienceLabel').textContent = isJobseeker ? 'Your Experience' : 'Required Experience';
                document.getElementById('locationLabel').textContent = isJobseeker ? 'Preferred Location' : 'Job Location';

                document.getElementById('postTitle').textContent = isJobseeker ? 'Post Your Resume' : 'Post New Job';
                document.getElementById('postLabel').textContent = isJobseeker ? 'Position You\'re Applying For' : 'Job Title';

                const postSkillsGroup = document.getElementById('postSkillsGroup');
                if (!isJobseeker) {
                    postSkillsGroup.classList.remove('hidden'); // Show for UMKM
                } else {
                    postSkillsGroup.classList.add('hidden');
                }

                // Pre-fill profile if exists
                if (this.currentUser.profile) {
                    document.getElementById('skills').value = this.currentUser.profile.skills || '';
                    document.getElementById('experience').value = this.currentUser.profile.experience || 'mid';
                    document.getElementById('location').value = this.currentUser.profile.location || '';
                }
                // Clear post fields
                document.getElementById('jobTitle').value = '';
                document.getElementById('postSkills').value = '';
                this.clearMessage();
            }

            async apiCall(action, data) {
                const url = `${SCRIPT_URL}?action=${action}`;
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();
                return result;
            }

            saveSession(user) {
                localStorage.setItem('skillmatch_current_user', JSON.stringify(user));
            }

            checkStoredSession() {
                const saved = localStorage.getItem('skillmatch_current_user');
                if (saved) {
                    try {
                        this.currentUser = JSON.parse(saved);
                        this.showDashboard();
                    } catch (e) {
                        localStorage.removeItem('skillmatch_current_user');
                    }
                }
            }

            logout() {
                this.currentUser = null;
                localStorage.removeItem('skillmatch_current_user');
                document.getElementById('authContainer').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('authForm').reset();
                document.getElementById('name').parentElement.style.display = 'block';
                this.isLoginMode = false;
                document.getElementById('authButton').textContent = 'Join SkillMatch';
                document.getElementById('switchText').textContent = 'Already have an account?';
                document.getElementById('switchMode').textContent = 'Login';
                this.clearMessage();
            }

            showMessage(msg, type) {
                const div = document.getElementById(
                    document.getElementById('dashboard').classList.contains('hidden') ? 'authMessage' : 'dashboardMessage'
                );
                div.className = type === 'error' ? 'error-message' : 'success-message';
                div.textContent = msg;
                if (type === 'success') {
                    setTimeout(() => { div.textContent = ''; div.className = ''; }, 3000);
                }
            }

            clearMessage() {
                document.getElementById('authMessage').textContent = '';
                document.getElementById('authMessage').className = '';
                document.getElementById('dashboardMessage').textContent = '';
                document.getElementById('dashboardMessage').className = '';
            }
        }

        new SkillMatchApp();
    </script>
</body>
</html>
